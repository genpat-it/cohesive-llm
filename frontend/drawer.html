<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="{{env "BASE_PATH"}}">
    <script>
        window.IZS_BASE_PATH = "{{env "BASE_PATH"}}".replace(/\/$/, '');
    </script>
    <title>Pipeline Drawer — Cohesive LLM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <link rel="stylesheet" href="style.css?v=8">
    <style>
        html.auth-pending body { visibility: hidden; }

        .drawer-layout {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* Component palette */
        .drawer-palette {
            width: 280px;
            background: #f8fafc;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .palette-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .palette-search {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
        }

        .palette-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .palette-search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(1,103,156,0.15);
        }

        .palette-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .palette-domain {
            margin-bottom: 8px;
        }

        .palette-domain-label {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .palette-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: grab;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            background: #fff;
            border: 1px solid var(--border);
            transition: all 0.15s;
            user-select: none;
        }
        .palette-item:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 2px 8px rgba(1,103,156,0.1);
        }
        .palette-item:active {
            cursor: grabbing;
        }
        .palette-item i {
            color: var(--primary);
            font-size: 11px;
            flex-shrink: 0;
        }
        .palette-item .tool-name {
            font-weight: 600;
            color: var(--primary);
        }

        /* Canvas */
        .drawer-canvas {
            flex: 1;
            position: relative;
            background: #fafbfc;
        }

        #drawflow {
            width: 100%;
            height: 100%;
        }

        /* Drawflow node styling */
        .drawflow-node {
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 12px;
            min-width: 180px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .drawflow-node.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(1,103,156,0.2);
        }
        .drawflow-node .drawflow_content_node {
            padding: 0;
        }

        .node-content {
            padding: 12px 16px;
        }

        /* Port labels next to Drawflow dots */
        .drawflow-node .input::after,
        .drawflow-node .output::after {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 1px 5px;
            border-radius: 4px;
            white-space: nowrap;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        .drawflow-node .input::after {
            content: attr(data-label);
            left: 16px;
            color: #2563eb;
            background: #eff6ff;
        }
        .drawflow-node .output::after {
            content: attr(data-label);
            right: 16px;
            color: #059669;
            background: #ecfdf5;
        }

        /* Connection delete hint */
        .drawflow .connection .main-path:hover {
            stroke-width: 4;
            cursor: pointer;
        }
        .node-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .node-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            word-break: break-all;
        }
        .node-tool {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Connections */
        .drawflow .connection .main-path {
            stroke: var(--primary);
            stroke-width: 2;
        }

        /* Bottom toolbar */
        .drawer-toolbar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .toolbar-btn.primary {
            background: var(--primary);
            color: #fff;
        }
        .toolbar-btn.primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(1,103,156,0.3);
        }
        .toolbar-btn.primary:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        .toolbar-btn.secondary {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .toolbar-btn.secondary:hover {
            background: #e2e8f0;
        }

        .toolbar-btn.danger {
            background: #fff;
            color: var(--error);
            border: 1px solid #fecaca;
        }
        .toolbar-btn.danger:hover {
            background: #fef2f2;
        }

        .node-count {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Drawing items */
        .drawing-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            margin: 2px 0;
            border-radius: 8px;
            transition: background 0.12s;
        }
        .drawing-item:hover { background: #ecf3f8; }
        .drawing-item.active { background: var(--primary-light); }
        .drawing-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.15s;
            font-size: 11px;
        }
        .drawing-item:hover .drawing-delete { opacity: 1; }
        .drawing-delete:hover { color: var(--error); background: #fef2f2; }

        /* Result overlay */
        .drawer-result {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: #fff;
            border-left: 1px solid var(--border);
            box-shadow: -4px 0 24px rgba(0,0,0,0.1);
            z-index: 20;
            display: none;
            flex-direction: column;
        }
        .drawer-result.open {
            display: flex;
        }
        .drawer-result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }
        .drawer-result-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }
        .drawer-result-body {
            flex: 1;
            overflow: auto;
            padding: 0;
        }
        .drawer-result-body pre {
            background: #1e1e1e;
            color: #e5e5e5;
            padding: 24px;
            margin: 0;
            height: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow: auto;
        }
    </style>
    <script>document.documentElement.classList.add('auth-pending');</script>
</head>
<body>
    <div class="app-shell">
        <header class="top-header">
            <div class="top-header-left">
                <a href="./" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
                    <img src="logo-izs-blue.jpg" alt="IZS Logo" class="top-logo">
                    <span class="top-title">Cohesive LLM</span>
                </a>
                <span style="color:var(--text-muted); font-size:13px; margin-left:8px;">/ Pipeline Drawer</span>
            </div>
            <div class="top-header-right">
                <a href="./" class="toolbar-btn secondary" style="text-decoration:none; padding:6px 14px; font-size:13px;">
                    <i class="fas fa-comments"></i> Chat
                </a>
            </div>
        </header>

        <div class="drawer-layout">
            <div class="drawer-palette">
                <div class="palette-header">
                    <i class="fas fa-puzzle-piece"></i> Components
                </div>
                <div class="palette-search">
                    <input type="text" id="paletteSearch" placeholder="Search components...">
                </div>
                <div class="palette-list" id="paletteList"></div>
                <div style="border-top:1px solid var(--border); padding:8px;">
                    <div class="palette-domain-label">Saved Drawings</div>
                    <div id="drawingsList" style="max-height:200px; overflow-y:auto;"></div>
                </div>
            </div>

            <div class="drawer-canvas">
                <div id="drawflow"></div>

                <div class="drawer-toolbar">
                    <span class="node-count">
                        <i class="fas fa-cube"></i>
                        <span id="nodeCount">0</span> nodes
                        <span style="margin-left:8px; font-weight:500;" id="drawingTitle">Untitled</span>
                    </span>
                    <button class="toolbar-btn secondary" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="toolbar-btn danger" id="clearBtn">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                    <button class="toolbar-btn primary" id="generateBtn">
                        <i class="fas fa-bolt"></i> Generate Pipeline
                    </button>
                </div>

                <div class="drawer-result" id="resultPanel">
                    <div class="drawer-result-header">
                        <h3><i class="fas fa-code" style="color:var(--primary); margin-right:8px;"></i>Generated Pipeline</h3>
                        <div style="display:flex; gap:8px;">
                            <button class="validate-btn" id="validateDrawerBtn" title="Validate with Nextflow">
                                <i class="fas fa-play-circle"></i> Validate
                            </button>
                            <button class="control-btn" id="copyResultBtn" title="Copy code">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="control-btn" id="closeResultBtn" title="Close">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <div class="drawer-result-body">
                        <pre><code id="resultCode"></code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
    <script type="module" src="js/drawer.js?v=1"></script>
</body>
</html>
