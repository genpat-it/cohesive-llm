<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- See index.html for the BASE_PATH explanation. -->
    <base href="{{env "BASE_PATH"}}">
    <script>
        window.IZS_BASE_PATH = "{{env "BASE_PATH"}}".replace(/\/$/, '');
    </script>

    <title>Login — Cohesive LLM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 380px;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo img { max-width: 140px; }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1e3a8a;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 1rem;
            transition: border-color 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30,64,175,0.15);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        button:hover { background: #1e3a8a; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.65rem 0.85rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="logo-izs-blue.jpg" alt="IZS">
        </div>
        <h1>Cohesive LLM</h1>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <div style="position:relative;">
                <input type="password" id="password" name="password" autocomplete="current-password" required style="padding-right:2.5rem;">
                <button type="button" id="togglePwd" style="position:absolute; right:8px; top:50%; transform:translateY(-70%); width:auto; padding:4px 8px; background:transparent; color:#9ca3af; font-size:1rem; cursor:pointer; border:none;" title="Show password">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <button type="submit" id="submitBtn">Sign in</button>
        </form>
    </div>

    <script>
        const BASE = window.IZS_BASE_PATH || '';
        const API_BASE = BASE + '/api';
        const APP_HOME = BASE + '/';

        document.getElementById('togglePwd').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                pwd.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        });

        const form = document.getElementById('loginForm');
        const errorBox = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('visible');
        }
        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('visible');
        }

        // If already authenticated, skip login. cache:no-store avoids the
        // browser reusing a stale 401 from a previous visit.
        fetch(API_BASE + '/auth/me', { credentials: 'same-origin', cache: 'no-store' })
            .then(r => { if (r.ok) window.location.href = APP_HOME; })
            .catch(() => {});

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    showError(data.detail || 'Invalid credentials');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign in';
                    return;
                }
                window.location.href = APP_HOME;
            } catch (err) {
                showError('Network error: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
