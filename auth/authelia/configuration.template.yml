###############################################################################
#                          Authelia Configuration                             #
# Rendered from template by scripts/render-authelia.sh                        #
###############################################################################

theme: light

server:
  address: 'tcp://0.0.0.0:9091/'

log:
  level: info

identity_validation:
  reset_password:
    jwt_secret: '${AUTHELIA_JWT_SECRET}'

totp:
  disable: true

webauthn:
  disable: true

duo_api:
  disable: true

# === AUTHENTICATION BACKEND ===
# Generated separately into auth/authelia/backend.yml and merged at runtime.
authentication_backend: __BACKEND_PLACEHOLDER__

access_control:
  default_policy: one_factor
  rules:
    - domain: '${DOMAIN}'
      policy: one_factor

session:
  secret: '${AUTHELIA_SESSION_SECRET}'
  cookies:
    - name: authelia_session
      domain: '${DOMAIN}'
      authelia_url: 'https://${DOMAIN}/authelia'
      default_redirection_url: 'https://${DOMAIN}'

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m

storage:
  encryption_key: '${AUTHELIA_STORAGE_KEY}'
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt
