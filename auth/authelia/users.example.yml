###############################################################################
#                File-based user database (AUTH_MODE=file)                    #
# Generate password hash with:                                                #
#   docker run --rm authelia/authelia:latest authelia hash-password 'yourpw'  #
###############################################################################
users:
  admin:
    displayname: "Administrator"
    # default password: "authelia"
    password: "$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/vzA4myCqZZ36bUGsDY//8mKUYNZZaR0t4MFFSs+iM"
    email: admin@example.com
    groups:
      - admins
      - dev
