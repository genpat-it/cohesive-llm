###############################################################################
#  Cohesive LLM — IZS Bioinformatics AI Platform                               #
#                                                                              #
#  Services:                                                                   #
#    - ngsmanager-init: clones the cohesive-ngsmanager framework on first run  #
#    - postgres:        application database (users, conversations, messages) #
#    - backend:         FastAPI + LangGraph LLM pipeline generator             #
#    - frontend:        static chat UI (nginx-unprivileged)                    #
#    - caddy:           reverse proxy + HTTPS (auto / internal / off)          #
#                                                                              #
#  Quick start:                                                                #
#    cp .env.example .env   # then edit secrets                                #
#    ./scripts/render-caddyfile.sh                                             #
#    docker compose up -d                                                      #
###############################################################################

services:

  # ─── Init: clones / updates the ngsmanager framework ──────────────────────
  ngsmanager-init:
    image: alpine/git:latest
    container_name: izs_ngsmanager_init
    volumes:
      - ngsmanager:/ngsmanager
    environment:
      - NGSMANAGER_REPO=${NGSMANAGER_REPO:-https://github.com/genpat-it/cohesive-ngsmanager.git}
      - NGSMANAGER_BRANCH=${NGSMANAGER_BRANCH:-main}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -d /ngsmanager/.git ]; then
          echo "[ngsmanager-init] Cloning ${NGSMANAGER_REPO} (branch=${NGSMANAGER_BRANCH})..."
          git clone --depth 1 --branch "$$NGSMANAGER_BRANCH" "$$NGSMANAGER_REPO" /ngsmanager
        else
          echo "[ngsmanager-init] Pulling latest..."
          cd /ngsmanager && git pull --ff-only || true
        fi
        echo "[ngsmanager-init] Done."
    restart: "no"

  # ─── Postgres: app database (users, conversations, messages) ─────────────
  postgres:
    image: postgres:16-alpine
    container_name: izs_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cohesive}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cohesive_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-cohesive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cohesive} -d ${POSTGRES_DB:-cohesive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend: FastAPI + LangGraph ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: izs_backend
    restart: unless-stopped
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - NGSMANAGER_DIR=/ngsmanager
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DEMO_USER=${DEMO_USER:-demo}
      - DEMO_PASSWORD=${DEMO_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9000,http://127.0.0.1:9000}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_PATH=${COOKIE_PATH:-/}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-5/minute}
    volumes:
      - ngsmanager:/ngsmanager:ro
    expose:
      - "8080"
    depends_on:
      ngsmanager-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─── Frontend: static chat UI ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: izs_frontend
    restart: unless-stopped
    environment:
      # Sub-path the app is exposed under (must end with a slash).
      # "/" → site root (dev). "/llm/" → behind a reverse proxy at /llm.
      - BASE_PATH=${BASE_PATH:-/}
    expose:
      - "8080"

  # ─── Caddy: reverse proxy + HTTPS ─────────────────────────────────────────
  # CADDY_HOST_PORT (default 80) is the host port where Caddy is exposed.
  # Set to e.g. 10000 when sitting behind another reverse proxy that handles TLS.
  # CADDY_HOST_HTTPS_PORT (default 443) — same idea for HTTPS.
  caddy:
    image: caddy:2-alpine
    container_name: izs_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HOST_PORT:-80}:80"
      - "${CADDY_HOST_HTTPS_PORT:-443}:443"
      # Optional extra HTTP port (e.g. 10000) for upstream reverse proxies
      # that prefer talking HTTP on a non-standard port. Only active when
      # CADDY_EXTRA_HTTP_PORT is set in .env.
      - "${CADDY_EXTRA_HTTP_PORT:-10000}:10000"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  ngsmanager:
    name: izs_ngsmanager
  caddy_data:
    name: izs_caddy_data
  caddy_config:
    name: izs_caddy_config
  postgres_data:
    name: izs_postgres_data
